<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serwis Naprawczy PRO v3.0 - KOMPLETNY</title>
    <style>
        /* Poprzedni CSS + DODATKOWE */
        .warehouse-item, .history-item { display: flex; justify-content: space-between; align-items: center; }
        .search-box { width: 100%; margin-bottom: 20px; }
        .empty-state { text-align: center; color: #94a3b8; font-style: italic; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER + TABS -->
        <div class="header">
            <h1>🛠️ Serwis Naprawczy PRO v3.0</h1>
            <p id="orderNum">Numer zlecenia: <strong>SRV-2026-12345</strong></p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('order')">📋 Zlecenie</button>
            <button class="tab-btn" onclick="showTab('history')">📊 Historia (<span id="historyCount">0</span>)</button>
            <button class="tab-btn" onclick="showTab('warehouse')">📦 Magazyn (<span id="warehouseCount">0</span>)</button>
        </div>

        <!-- ZLECENIE (bez zmian z poprzedniego) -->
        <div id="order-tab" class="tab-content active">
            <!-- ... WSZYSTKO Z POPRZEDNIEGO KODU - STAWKI, KLIENT, PRACA, CZĘŚCI, DOJAZD, PODSUMOWANIE ... -->
            <!-- Wklej sekcję zlecenia z poprzedniego kodu -->
        </div>

        <!-- HISTORIA ZLECENIE -->
        <div id="history-tab" class="tab-content">
            <div class="card">
                <h3>📊 Historia zleceń</h3>
                <div class="input-group">
                    <input type="text" id="historySearch" class="search-box" placeholder="🔍 Szukaj po kliencie, telefonie, numerze..." onkeyup="filterHistory()">
                </div>
                <div id="historyList" class="list-container">
                    <div class="empty-state">Brak zapisanych zleceń. Zapisz pierwsze z zakładki "Zlecenie"!</div>
                </div>
                <div style="text-align: center; margin-top: 30px;">
                    <button class="btn btn-secondary" onclick="showTab('order')">➕ Nowe zlecenie</button>
                </div>
            </div>
        </div>

        <!-- MAGAZYN -->
        <div id="warehouse-tab" class="tab-content">
            <div class="card">
                <h3>📦 Magazyn części</h3>
                <div class="form-grid" style="grid-template-columns: 2fr 1fr 1fr auto; gap: 15px;">
                    <div class="input-group">
                        <label>Nazwa części</label>
                        <input type="text" id="whName" placeholder="Bateria litowa">
                    </div>
                    <div class="input-group">
                        <label>Nr katalogowy</label>
                        <input type="text" id="whNumber" placeholder="BAT-001">
                    </div>
                    <div class="input-group">
                        <label>Ilość (szt.)</label>
                        <input type="number" id="whQty" value="1" min="1">
                    </div>
                    <button class="btn btn-primary" onclick="addWarehouseItem()">➕ Dodaj do magazynu</button>
                </div>
                <div id="warehouseList" class="list-container">
                    <div class="empty-state">Magazyn pusty. Dodaj pierwszą część!</div>
                </div>
                <div style="text-align: center; margin-top: 30px;">
                    <button class="btn btn-secondary" onclick="showTab('order')">⬅️ Powrót do zlecenia</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === GLOBALNE DANE ===
        let workDays = [];
        let parts = [];
        let warehouseItems = JSON.parse(localStorage.getItem('warehouse') || '[]');
        let savedOrders = JSON.parse(localStorage.getItem('orders') || '[]');
        let orderNumber = 'SRV-2026-' + Math.floor(Math.random() * 90000 + 10000);

        // === INICJALIZACJA ===
        window.onload = function() {
            document.getElementById('orderNum').innerHTML = 'Numer zlecenia: <strong>' + orderNumber + '</strong>';
            renderWarehouse();
            renderHistory();
            updateCalculations();
        };

        // === FUNKCJE ZLECENIA (z poprzedniego kodu) ===
        // calcDayCost, calcPartTotal, calcTravelCost, updateCalculations, addWorkDay, addPart, removeWorkDay, removePart

        // === MAGAZYN ===
        function addWarehouseItem() {
            const name = document.getElementById('whName').value.trim();
            const number = document.getElementById('whNumber').value.trim();
            const qty = parseInt(document.getElementById('whQty').value) || 0;

            if (!name || qty <= 0) {
                alert('Podaj nazwę i ilość!');
                return;
            }

            warehouseItems.push({ name, number, qty, id: Date.now() });
            localStorage.setItem('warehouse', JSON.stringify(warehouseItems));
            renderWarehouse();

            // Reset form
            document.getElementById('whName').value = '';
            document.getElementById('whNumber').value = '';
            document.getElementById('whQty').value = '1';
        }

        function renderWarehouse() {
            const container = document.getElementById('warehouseList');
            const countEl = document.getElementById('warehouseCount');
            
            if (warehouseItems.length === 0) {
                container.innerHTML = '<div class="empty-state">Magazyn pusty. Dodaj pierwszą część!</div>';
                countEl.textContent = '0';
                return;
            }

            container.innerHTML = '';
            warehouseItems.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'list-item warehouse-item added-item';
                div.innerHTML = `
                    <div>
                        <strong>${item.name}</strong> 
                        <span style="color: #64748b;">#${item.number || 'brak'}</span>
                    </div>
                    <div style="text-align: right;">
                        <span style="color: #10b981; font-weight: bold; font-size: 1.1rem;">${item.qty} szt.</span>
                        <button class="btn btn-danger" onclick="removeWarehouseItem(${index})" style="margin-left: 10px;">🗑️</button>
                    </div>
                `;
                container.appendChild(div);
            });
            countEl.textContent = warehouseItems.length;
        }

        function removeWarehouseItem(index) {
            if (confirm('Usunąć część z magazynu?')) {
                warehouseItems.splice(index, 1);
                localStorage.setItem('warehouse', JSON.stringify(warehouseItems));
                renderWarehouse();
            }
        }

        // === HISTORIA ===
        function saveOrder() {
            const total = parseFloat(document.getElementById('grandTotal').textContent) || 0;
            const order = {
                id: Date.now(),
                orderNumber,
                clientName: document.getElementById('clientName').value,
                clientPhone: document.getElementById('clientPhone').value,
                deviceName: document.getElementById('deviceName').value,
                laborRate: document.getElementById('laborRate').value,
                kmRate: document.getElementById('kmRate').value,
                workDays,
                parts,
                km: document.getElementById('km').value,
                total: total.toFixed(2),
                date: new Date().toLocaleDateString('pl-PL')
            };

            savedOrders.unshift(order); // Dodaj na początek
            localStorage.setItem('orders', JSON.stringify(savedOrders));
            
            // Reset zlecenia
            workDays = [];
            parts = [];
            orderNumber = 'SRV-2026-' + Math.floor(Math.random() * 90000 + 10000);
            document.getElementById('orderNum').innerHTML = 'Numer zlecenia: <strong>' + orderNumber + '</strong>';
            updateCalculations();
            renderWorkDays();
            renderParts();

            alert('✅ Zlecenie zapisane! Przejdź do Historii.');
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            const countEl = document.getElementById('historyCount');
            
            if (savedOrders.length === 0) {
                container.innerHTML = '<div class="empty-state">Brak zapisanych zleceń. Zapisz pierwsze z zakładki "Zlecenie"!</div>';
                countEl.textContent = '0';
                return;
            }

            container.innerHTML = '';
            savedOrders.forEach((order, index) => {
                const div = document.createElement('div');
                div.className = 'list-item history-item';
                div.innerHTML = `
                    <div>
                        <strong style="font-size: 1.2rem;">${order.orderNumber}</strong><br>
                        <span>${order.clientName}</span> • ${order.clientPhone}<br>
                        <small>${order.deviceName}</small>
                    </div>
                    <div style="text-align: right;">
                        <div style="color: #059669; font-size: 1.5rem; font-weight: bold;">${order.total} zł</div>
                        <div style="font-size: 0.8rem; color: #64748b;">${order.date}</div>
                        <button class="btn btn-primary" onclick="loadOrder(${index})" style="margin-top: 10px;">📋 Edytuj</button>
                    </div>
                `;
                container.appendChild(div);
            });
            countEl.textContent = savedOrders.length;
        }

        function filterHistory() {
            const search = document.getElementById('historySearch').value.toLowerCase();
            const items = document.querySelectorAll('#historyList .list-item');
            let visible = 0;

            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                if (text.includes(search)) {
                    item.style.display = 'flex';
                    visible++;
                } else {
                    item.style.display = 'none';
                }
            });
        }

        function loadOrder(index) {
            const order = savedOrders[index];
            document.getElementById('clientName').value = order.clientName;
            document.getElementById('clientPhone').value = order.clientPhone;
            document.getElementById('deviceName').value = order.deviceName;
            document.getElementById('laborRate').value = order.laborRate;
            document.getElementById('kmRate').value = order.kmRate;
            document.getElementById('km').value = order.km;
            
            workDays = order.workDays || [];
            parts = order.parts || [];
            orderNumber = order.orderNumber;
            
            renderWorkDays();
            renderParts();
            updateCalculations();
            
            showTab('order');
            alert('Zlecenie załadowane do edycji!');
        }

        // === TABY ===
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>

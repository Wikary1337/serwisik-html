<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<title>System Serwisowy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f3f3f3;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input,button,select{
width:100%;
padding:10px;
margin-top:8px;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

.card{
border:1px solid #ddd;
padding:15px;
margin-top:20px;
border-radius:8px;
}

.tabs button{
width:auto;
margin-right:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>System Serwisowy</h1>

<div class="tabs">
<button onclick="showTab('order')">Zlecenie</button>
<button onclick="showTab('history')">Historia</button>
<button onclick="showTab('warehouse')">Magazyn</button>
</div>


<!-- ================= ORDER ================= -->

<div id="order">

<div class="card">

<h3>Dane klienta</h3>

<input id="clientName" placeholder="Imię i nazwisko">
<input id="clientPhone" placeholder="Telefon">
<input id="deviceName" placeholder="Urządzenie">

<p>Numer zlecenia: <span id="orderNumber"></span></p>

</div>


<div class="card">

<h3>Czas pracy</h3>

<input id="laborRate" type="number" value="100" placeholder="Stawka godzinowa">

<input type="date" id="workDate">

<input type="number" id="hoursInput" placeholder="Godziny">

<button onclick="addHours()">Dodaj godziny</button>

<ul id="hoursList"></ul>

<p>Suma godzin: <span id="totalHours">0</span></p>

<p>Koszt pracy: <span id="laborCost">0</span> zł</p>

</div>


<div class="card">

<h3>Części</h3>

<input id="partName" placeholder="Nazwa części">

<input id="partPrice" type="number" placeholder="Cena">

<input id="partQty" type="number" value="1">

<button onclick="addPart()">Dodaj część</button>

<ul id="partsList"></ul>

<p>Suma części: <span id="partsCost">0</span> zł</p>

</div>


<div class="card">

<h3>Dojazd</h3>

<input id="km" type="number" placeholder="Kilometry">

<input id="kmRate" type="number" value="1" placeholder="Stawka km">

<p>Koszt dojazdu: <span id="travelCost">0</span> zł</p>

</div>


<div class="card">

<h3>Podsumowanie</h3>

<p>Łączna cena: <span id="totalCost">0</span> zł</p>

<button onclick="saveOrder()">Zapisz zlecenie</button>

<button onclick="generatePDF()">Generuj PDF</button>

</div>

</div>


<!-- ================= HISTORY ================= -->

<div id="history" style="display:none">

<h2>Historia zleceń</h2>

<input id="search" placeholder="Szukaj klienta" oninput="renderOrders()">

<div id="ordersList"></div>

</div>


<!-- ================= WAREHOUSE ================= -->

<div id="warehouse" style="display:none">

<h2>Magazyn</h2>

<input id="whName" placeholder="Nazwa części">
<input id="whNumber" placeholder="Numer części">
<input id="whQty" type="number" placeholder="Ilość">

<button onclick="addWarehouse()">Dodaj</button>

<ul id="warehouseList"></ul>

</div>

</div>


<script>

let dailyHours=[]
let parts=[]
let warehouse=[]
let orders=[]

function generateOrderNumber(){
return "SRV-"+new Date().getFullYear()+"-"+Date.now().toString().slice(-5)
}

let orderNumber=generateOrderNumber()

document.getElementById("orderNumber").innerText=orderNumber


function showTab(tab){

document.getElementById("order").style.display="none"
document.getElementById("history").style.display="none"
document.getElementById("warehouse").style.display="none"

document.getElementById(tab).style.display="block"

}


function addHours(){

const date=document.getElementById("workDate").value
const hours=Number(document.getElementById("hoursInput").value)

if(!date||!hours)return

dailyHours.push({date,hours})

renderHours()

}


function renderHours(){

const list=document.getElementById("hoursList")

list.innerHTML=""

dailyHours.forEach(h=>{
const li=document.createElement("li")
li.innerText=h.date+" — "+h.hours+" h"
list.appendChild(li)
})

calculate()

}


function addPart(){

const name=document.getElementById("partName").value
const price=Number(document.getElementById("partPrice").value)
const qty=Number(document.getElementById("partQty").value)

if(!name||!price)return

parts.push({name,price,qty})

renderParts()

}


function renderParts(){

const list=document.getElementById("partsList")

list.innerHTML=""

parts.forEach(p=>{
const li=document.createElement("li")
li.innerText=p.name+" "+p.qty+" x "+p.price+" zł"
list.appendChild(li)
})

calculate()

}


function calculate(){

const laborRate=Number(document.getElementById("laborRate").value)

const km=Number(document.getElementById("km").value||0)

const kmRate=Number(document.getElementById("kmRate").value)

const totalHours=dailyHours.reduce((s,d)=>s+d.hours,0)

const laborCost=totalHours*laborRate

const partsCost=parts.reduce((s,p)=>s+p.price*p.qty,0)

const travelCost=km*kmRate

const total=laborCost+partsCost+travelCost

document.getElementById("totalHours").innerText=totalHours
document.getElementById("laborCost").innerText=laborCost
document.getElementById("partsCost").innerText=partsCost
document.getElementById("travelCost").innerText=travelCost
document.getElementById("totalCost").innerText=total

}


function saveOrder(){

const order={
orderNumber,
clientName:document.getElementById("clientName").value,
clientPhone:document.getElementById("clientPhone").value,
deviceName:document.getElementById("deviceName").value,
parts,
dailyHours,
total:document.getElementById("totalCost").innerText
}

orders.unshift(order)

localStorage.setItem("orders",JSON.stringify(orders))

alert("Zapisano zlecenie")

renderOrders()

}


function renderOrders(){

orders=JSON.parse(localStorage.getItem("orders")||"[]")

const search=document.getElementById("search").value.toLowerCase()

const list=document.getElementById("ordersList")

list.innerHTML=""

orders
.filter(o=>o.clientName.toLowerCase().includes(search))
.forEach(o=>{

const div=document.createElement("div")

div.className="card"

div.innerHTML=`

Numer: ${o.orderNumber}<br>
Klient: ${o.clientName}<br>
Telefon: ${o.clientPhone}<br>
Urządzenie: ${o.deviceName}<br>
Koszt: ${o.total} zł

`

list.appendChild(div)

})

}


function addWarehouse(){

const name=document.getElementById("whName").value
const number=document.getElementById("whNumber").value
const qty=document.getElementById("whQty").value

warehouse.push({name,number,qty})

localStorage.setItem("warehouse",JSON.stringify(warehouse))

renderWarehouse()

}


function renderWarehouse(){

warehouse=JSON.parse(localStorage.getItem("warehouse")||"[]")

const list=document.getElementById("warehouseList")

list.innerHTML=""

warehouse.forEach(p=>{
const li=document.createElement("li")
li.innerText=p.name+" | nr:"+p.number+" | ilość:"+p.qty
list.appendChild(li)
})

}


function generatePDF(){

const {jsPDF}=window.jspdf

const doc=new jsPDF()

doc.text("PROTOKÓŁ NAPRAWY",10,10)

doc.text("Numer: "+orderNumber,10,20)

doc.text("Klient: "+document.getElementById("clientName").value,10,30)

doc.text("Telefon: "+document.getElementById("clientPhone").value,10,40)

doc.text("Urządzenie: "+document.getElementById("deviceName").value,10,50)

doc.text("Cena: "+document.getElementById("totalCost").innerText+" zł",10,70)

doc.save("zlecenie_"+orderNumber+".pdf")

}


renderOrders()

renderWarehouse()

</script>

</body>
</html>

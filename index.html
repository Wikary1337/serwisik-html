<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serwis Naprawczy PRO v2.1 - DZIAŁA!</title>
    <style>
        /* TEN SAM CSS jak wcześniej - bez zmian */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        /* ... reszta CSS z poprzedniego kodu ... */
        .dynamic-calc { background: #fefce8 !important; font-weight: bold !important; color: #92400e !important; }
        .list-container { min-height: 100px; border: 2px dashed #cbd5e1; border-radius: 12px; padding: 15px; margin-top: 15px; }
        .added-item { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER + TABS - bez zmian -->
        <div class="header">
            <h1>🛠️ Serwis Naprawczy PRO v2.1</h1>
            <p id="orderNum">Numer zlecenia: <strong>SRV-2026-12345</strong></p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('order')">📋 Zlecenie</button>
            <button class="tab-btn" onclick="showTab('history')">📊 Historia</button>
            <button class="tab-btn" onclick="showTab('warehouse')">📦 Magazyn</button>
        </div>

        <!-- ZLECENIE -->
        <div id="order-tab" class="tab-content active">
            <!-- STAWKI -->
            <div class="card rates-section">
                <h3>⚙️ Ustawienia stawek</h3>
                <div class="form-grid">
                    <div class="input-group">
                        <label>💰 Stawka godzinowa (zł/h)</label>
                        <input type="number" id="laborRate" value="120" step="5" min="0" onchange="updateCalculations()">
                    </div>
                    <div class="input-group">
                        <label>🚗 Stawka za km (zł)</label>
                        <input type="number" id="kmRate" value="1.20" step="0.05" min="0" onchange="updateCalculations()">
                    </div>
                </div>
            </div>

            <!-- KLINT -->
            <div class="card">
                <h3>👤 Dane klienta</h3>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Imię i nazwisko</label>
                        <input type="text" id="clientName" value="Jan Kowalski">
                    </div>
                    <div class="input-group">
                        <label>Telefon</label>
                        <input type="tel" id="clientPhone" value="+48 123 456 789">
                    </div>
                    <div class="input-group">
                        <label>Urządzenie</label>
                        <input type="text" id="deviceName" value="Laptop Dell XPS 13">
                    </div>
                </div>
            </div>

            <!-- PRACA -->
            <div class="card">
                <h3>⏰ Czas pracy</h3>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Data</label>
                        <input type="date" id="workDate" value="2026-03-25">
                    </div>
                    <div class="input-group">
                        <label>Godziny</label>
                        <input type="number" id="workHours" value="8" step="0.5" min="0" onchange="calcDayCost()">
                    </div>
                    <div class="input-group">
                        <label>Koszt dnia</label>
                        <input type="number" id="dayCost" value="960" class="dynamic-calc" readonly>
                    </div>
                    <button class="btn btn-primary" onclick="addWorkDay()">➕ Dodaj dzień</button>
                </div>
                <div id="workDaysList" class="list-container"></div>
                <div class="summary">
                    SUMA PRACY: <span id="totalLabor">0 h = 0 zł</span>
                </div>
            </div>

            <!-- CZĘŚCI -->
            <div class="card">
                <h3>🔧 Części</h3>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Nazwa</label>
                        <input type="text" id="partName" placeholder="Bateria litowa">
                    </div>
                    <div class="input-group">
                        <label>Cena/szt.</label>
                        <input type="number" id="partPrice" value="250" step="0.01" min="0" onchange="calcPartTotal()">
                    </div>
                    <div class="input-group">
                        <label>Ilość</label>
                        <input type="number" id="partQty" value="1" min="1" onchange="calcPartTotal()">
                    </div>
                    <div class="input-group">
                        <label>Koszt</label>
                        <input type="number" id="partTotal" value="250" class="dynamic-calc" readonly>
                    </div>
                    <button class="btn btn-primary" onclick="addPart()">➕ Dodaj</button>
                </div>
                <div id="partsList" class="list-container"></div>
                <div class="summary">
                    SUMA CZĘŚCI: <span id="totalParts">0 zł</span>
                </div>
            </div>

            <!-- DOJAZD -->
            <div class="card">
                <h3>🚗 Dojazd</h3>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Kilometry</label>
                        <input type="number" id="km" value="25" step="0.1" min="0" onchange="calcTravelCost()">
                    </div>
                    <div class="input-group">
                        <label>Koszt</label>
                        <input type="number" id="travelCost" value="30" class="dynamic-calc" readonly>
                    </div>
                </div>
                <div class="summary">KOSZT DOJAZDU: <span id="travelTotal">30 zł</span></div>
            </div>

            <!-- PODSUMOWANIE -->
            <div class="card" style="background: linear-gradient(135deg, #a7f3d0, #86efac); border: 2px solid #10b981;">
                <h3>💰 FINALNE PODSUMOWANIE</h3>
                <div class="summary" style="background: white; border: 3px solid #10b981;">
                    <div>⏰ Praca: <span id="sumLabor">1,440 zł</span></div>
                    <div>🔧 Części: <span id="sumParts">250 zł</span></div>
                    <div>🚗 Dojazd: <span id="sumTravel">30 zł</span></div>
                    <hr style="border: 2px solid #10b981;">
                    <div class="total-final">Łącznie: <span id="grandTotal">1,720 zł</span></div>
                </div>
                <div style="text-align: center; margin-top: 25px;">
                    <button class="btn btn-primary" onclick="saveOrder()" style="font-size: 1.3rem; padding: 20px 40px;">💾 ZAPISZ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DANE APLIKACJI
        let workDays = [];
        let parts = [];
        let orderNumber = 'SRV-2026-' + Math.floor(Math.random() * 90000 + 10000);

        // INICJALIZACJA
        document.getElementById('orderNum').innerHTML = 'Numer zlecenia: <strong>' + orderNumber + '</strong>';
        updateCalculations();

        // FUNKCJE PRZELICZAJĄCE
        function calcDayCost() {
            const rate = parseFloat(document.getElementById('laborRate').value) || 0;
            const hours = parseFloat(document.getElementById('workHours').value) || 0;
            document.getElementById('dayCost').value = (rate * hours).toFixed(2);
        }

        function calcPartTotal() {
            const price = parseFloat(document.getElementById('partPrice').value) || 0;
            const qty = parseFloat(document.getElementById('partQty').value) || 0;
            document.getElementById('partTotal').value = (price * qty).toFixed(2);
        }

        function calcTravelCost() {
            const rate = parseFloat(document.getElementById('kmRate').value) || 0;
            const km = parseFloat(document.getElementById('km').value) || 0;
            const cost = rate * km;
            document.getElementById('travelCost').value = cost.toFixed(2);
            document.getElementById('travelTotal').textContent = cost.toFixed(2) + ' zł';
            updateCalculations();
        }

        function updateCalculations() {
            calcDayCost();
            calcPartTotal();
            calcTravelCost();

            // Sumy
            const laborSum = workDays.reduce((sum, day) => sum + day.cost, 0);
            const partsSum = parts.reduce((sum, part) => sum + part.total, 0);
            const travel = parseFloat(document.getElementById('travelCost').value) || 0;
            const grandTotal = laborSum + partsSum + travel;

            document.getElementById('totalLabor').textContent = workDays.reduce((sum, day) => sum + day.hours, 0) + ' h = ' + laborSum.toFixed(2) + ' zł';
            document.getElementById('totalParts').textContent = partsSum.toFixed(2) + ' zł';
            document.getElementById('sumLabor').textContent = laborSum.toFixed(2) + ' zł';
            document.getElementById('sumParts').textContent = partsSum.toFixed(2) + ' zł';
            document.getElementById('sumTravel').textContent = travel.toFixed(2) + ' zł';
            document.getElementById('grandTotal').textContent = grandTotal.toFixed(2) + ' zł';
        }

        // DODAWANIE
        function addWorkDay() {
            const date = document.getElementById('workDate').value;
            const hours = parseFloat(document.getElementById('workHours').value) || 0;
            const cost = parseFloat(document.getElementById('dayCost').value) || 0;

            if (!date || hours <= 0) return alert('Podaj datę i godziny!');

            workDays.push({ date, hours, cost });
            renderWorkDays();
            updateCalculations();

            // Reset form
            document.getElementById('workDate').value = '';
            document.getElementById('workHours').value = '';
            document.getElementById('dayCost').value = '';
        }

        function addPart() {
            const name = document.getElementById('partName').value.trim();
            const total = parseFloat(document.getElementById('partTotal').value) || 0;

            if (!name || total <= 0) return alert('Podaj nazwę i cenę!');

            parts.push({ name, total });
            renderParts();
            updateCalculations();

            // Reset
            document.getElementById('partName').value = '';
            document.getElementById('partPrice').value = '';
            document.getElementById('partQty').value = '1';
            document.getElementById('partTotal').value = '';
        }

        // RENDER
        function renderWorkDays() {
            const container = document.getElementById('workDaysList');
            container.innerHTML = '';
            workDays.forEach((day, index) => {
                const div = document.createElement('div');
                div.className = 'list-item added-item';
                div.innerHTML = `
                    <span>📅 ${day.date} • ${day.hours}h • <strong>${day.cost.toFixed(2)} zł</strong></span>
                    <button class="btn btn-danger" onclick="removeWorkDay(${index})">🗑️</button>
                `;
                container.appendChild(div);
            });
        }

        function renderParts() {
            const container = document.getElementById('partsList');
            container.innerHTML = '';
            parts.forEach((part, index) => {
                const div = document.createElement('div');
                div.className = 'list-item added-item';
                div.innerHTML = `
                    <span>🔧 ${part.name} • <strong>${part.total.toFixed(2)} zł</strong></span>
                    <button class="btn btn-danger" onclick="removePart(${index})">🗑️</button>
                `;
                container.appendChild(div);
            });
        }

        // USUWANIE
        function removeWorkDay(index) {
            workDays.splice(index, 1);
            renderWorkDays();
            updateCalculations();
        }

        function removePart(index) {
            parts.splice(index, 1);
            renderParts();
            updateCalculations();
        }

        // ZAPIS
        function saveOrder() {
            const data = {
                orderNumber,
                clientName: document.getElementById('clientName').value,
                clientPhone: document.getElementById('clientPhone').value,
                deviceName: document.getElementById('deviceName').value,
                laborRate: document.getElementById('laborRate').value,
                kmRate: document.getElementById('kmRate').value,
                workDays,
                parts,
                km: document.getElementById('km').value,
                total: document.getElementById('grandTotal').textContent
            };
            
            // Pobierz jako JSON
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `zlecenie_${orderNumber}.json`;
            a.click();
            
            alert('✅ Zlecenie zapisane! Sprawdź pobrany plik JSON.');
        }

        // TABY (bez zmian)
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
